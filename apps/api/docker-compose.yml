services:
  api:
    build: .
    container_name: marginalia-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      SKIP_MIGRATIONS: "2"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped
