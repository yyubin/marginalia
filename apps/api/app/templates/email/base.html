<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{% block title %}Marginalia{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#0d0d0d;-webkit-font-smoothing:antialiased;mso-line-height-rule:exactly;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"
         style="background-color:#0d0d0d;">
    <tr>
      <td align="center" style="padding:48px 16px 40px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"
               style="max-width:520px;">

          <!-- Wordmark -->
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <span style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
                           font-size:19px;font-weight:700;letter-spacing:-0.5px;color:#ffffff;">
                marginalia
              </span>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color:#1c1c1e;border-radius:16px;padding:40px 36px;
                       font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
                         font-size:12px;color:#4a4a4a;line-height:1.6;">
                이 이메일은 Marginalia 계정 활동으로 인해 발송되었습니다.<br>
                본인이 요청하지 않은 경우 이 이메일을 무시하셔도 됩니다.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
